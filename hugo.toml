baseURL = '/'
languageCode = 'en-us'
title = 'towaos blog'
theme = "github-style"
pygmentsCodeFences = true
pygmentsUseClasses = true

[pagination]
pagerSize = 15
path = "page"

[params]
author = "towaos"
description = "Let's Gooo!!"
avatar = "/images/towaos_icon.png"
github = "towaos"
url = "https://blog.towaos.com"
favicon = "/images/towaos.png"
headerIcon = "images/towaos_icon.png"
userStatusEmoji = "😀"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
ignoreLogs = ['warning-goldmark-raw-html']